<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App</title>

<style>
    body{
        font-family: Arial;
        background-color:rgb(209, 216, 103);
        margin-top: 50px;
        align-items: center;
        display: flex;
        flex-direction: column;
    }

    input{
        padding: 8px;
    }

    button{
        padding: 8px 12px;
    }

    li{
        margin: 5px;
    }
</style>
</head>
<body>

<h1>Todo List</h1>

<input type="text" id="Input" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<ul id="todo_list"></ul>

<script>
    let tasks = [];

    function addTask(){

        let input = document.getElementById("Input").value;

        if(input === "") return;

        tasks.push(input);

        let list = document.getElementById("todo_list");
        list.innerHTML = "";

        tasks.forEach(function(task){
            list.innerHTML += `<li>${task}</li>`;
        });

        document.getElementById("Input").value = "";
    }
</script>

</body>
</html>
